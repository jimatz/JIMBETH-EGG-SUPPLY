<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIMBETH EGG SUPPLY</title>
    <style>
        :root { --primary: #333; --bg: #f4f4f4; }
        body, html { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: var(--bg); }
        .container { 
            height: 100vh; display: flex; flex-direction: column; padding: 10px; 
            box-sizing: border-box; background: #fff; max-width: 500px; margin: auto; 
        }
        
        h1 { font-size: 16px; margin: 0 0 10px 0; color: var(--primary); border-bottom: 2px solid var(--primary); text-align: center; }
        
        /* Expanded Item Table Section */
        table { width: 100%; border-collapse: collapse; margin-bottom: 5px; }
        th, td { border: 1px solid #eee; padding: 6px !important; text-align: center; font-size: 12px; }
        th { background: #f8f8f8; }
        .qty { width: 40px !important; padding: 4px !important; height: 24px !important; text-align: center; border: 1px solid #ccc; font-size: 13px; }
        .btn-qty { padding: 2px 8px !important; height: 24px; font-size: 14px; cursor: pointer; }
        
        /* Inputs & Summary */
        .input-row { display: flex; gap: 5px; margin-bottom: 5px; }
        input, select, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 5px; }
        .s-box { padding: 6px; text-align: center; border-radius: 4px; font-weight: bold; color: white; font-size: 12px; }
        
        /* Filter Section */
        .filter-section { background: #eee; padding: 6px; border-radius: 4px; margin-bottom: 5px; }
        
        /* Scrollable History Section */
        #history { flex-grow: 1; overflow-y: auto; border: 1px solid #eee; padding: 5px; }
        .card { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-action { background: var(--primary); color: #fff; border: none; cursor: pointer; width: 100%; font-weight: bold; padding: 10px; margin-bottom: 5px; }
        .btn-cancel { background: #dc3545; color: #fff; border: none; cursor: pointer; width: 100%; font-weight: bold; padding: 10px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>JIMBETH EGG SUPPLY</h1>
    <input type="text" id="customer" placeholder="Customer Name" style="width: 100%; margin-bottom: 5px;">
    
    <table>
        <thead><tr><th>Item</th><th>Total</th><th>Sold</th></tr></thead>
        <tbody id="itemTableBody"></tbody>
    </table>

    <div class="input-row">
        <input type="number" id="amount" placeholder="Amount (₱)" style="flex: 2;">
        <select id="paymentType" style="flex: 1;">
            <option>Cash</option>
            <option>Online</option>
            <option>Consignment</option>
        </select>
    </div>
    <button id="saveBtn" class="btn-action" onclick="saveRecord()">SAVE RECORD</button>
    <button id="cancelBtn" class="btn-cancel" onclick="resetForm()" style="display:none;">CANCEL EDIT</button>

    <div class="summary-row">
        <div class="s-box" style="background: #28a745;">CASH: <span id="cashTotal">0</span></div>
        <div class="s-box" style="background: #007bff;">ONLINE: <span id="onlineTotal">0</span></div>
    </div>
    
    <div class="filter-section">
        <label for="dateFilter" style="display: block; font-weight: bold; font-size: 11px; margin-bottom: 2px;">Filter Records by Date:</label>
        <input type="date" id="dateFilter" onchange="updateUI()" style="width: 100%; padding: 5px;">
    </div>

    <h3 style="margin: 5px 0;">History</h3>
    <div id="history"></div>
</div>

<script>
    let db, editingId = null;
    const PASSCODE = "0729";
    const items = ["PEEWEE", "PULLET", "SMALL", "MEDIUM", "LARGE", "XL", "JUMBO", "S-JUMBO", "OTHERS", "SALTED"];
    
    const req = indexedDB.open("SystemDB", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("data", {keyPath: "id", autoIncrement: true});
    req.onsuccess = e => { db = e.target.result; updateUI(); };

    function saveRecord() {
        const c = document.getElementById('customer').value.trim();
        const a = document.getElementById('amount').value.trim();
        if (!c || !a) return alert("Paki-fill up ang Name at Amount!");

        const qtyInputs = document.querySelectorAll('.qty');
        const data = { 
            customer: c, 
            rows: items.map((n, i) => ({ name: n, qty: parseInt(qtyInputs[i].value) || 0 })), 
            amount: a, 
            payment: document.getElementById('paymentType').value,
            date: new Date().toISOString().split('T')[0]
        };

        const tx = db.transaction("data", "readwrite");
        editingId ? (data.id = editingId, tx.objectStore("data").put(data)) : tx.objectStore("data").add(data);
        tx.oncomplete = () => { updateUI(); resetForm(); };
    }

    function resetForm() {
        document.getElementById('customer').value = "";
        document.getElementById('amount').value = "";
        document.querySelectorAll('.qty').forEach(i => i.value = "");
        editingId = null;
        document.getElementById('saveBtn').innerText = "SAVE RECORD";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function changeQty(b, v) { 
        let i = b.parentElement.querySelector('input'); 
        let n = (parseInt(i.value) || 0) + v; 
        i.value = n > 0 ? n : ""; 
    }

    function updateTable(totals = {}) {
        document.getElementById('itemTableBody').innerHTML = items.map(i => `
            <tr><td style="text-align:left; font-weight:bold;">${i}</td>
            <td style="padding: 4px !important;">
            <button class="btn-qty" onclick="changeQty(this, -1)">-</button>
            <input type="number" class="qty" value="" placeholder="0">
            <button class="btn-qty" onclick="changeQty(this, 1)">+</button></td>
            <td><b>${totals[i] > 0 ? totals[i] : ""}</b></td></tr>`).join('');
    }

    function editRecord(id) {
        if (prompt("Ilagay ang passcode para mag-edit:") !== PASSCODE) return;
        db.transaction("data", "readonly").objectStore("data").get(id).onsuccess = e => {
            const r = e.target.result;
            document.getElementById('customer').value = r.customer;
            document.getElementById('amount').value = r.amount;
            document.getElementById('paymentType').value = r.payment;
            r.rows.forEach((row, i) => { document.querySelectorAll('.qty')[i].value = row.qty > 0 ? row.qty : ""; });
            editingId = id;
            document.getElementById('saveBtn').innerText = "UPDATE RECORD";
            document.getElementById('cancelBtn').style.display = "block";
        };
    }

    function deleteRecord(id) {
        if (prompt("Ilagay ang passcode para magbura:") !== PASSCODE) return;
        db.transaction("data", "readwrite").objectStore("data").delete(id).onsuccess = () => {
            updateUI();
            if (editingId === id) resetForm();
        };
    }

    function updateUI() {
        db.transaction("data", "readonly").objectStore("data").getAll().onsuccess = e => {
            const recs = e.target.result;
            const filter = document.getElementById('dateFilter').value;
            const filtered = filter ? recs.filter(r => r.date === filter) : recs;

            let tot = {}; items.forEach(i => tot[i] = 0);
            filtered.forEach(r => (r.rows || []).forEach(row => tot[row.name] = (tot[row.name] || 0) + row.qty));
            updateTable(tot);

            let cs=0, os=0; filtered.forEach(r => { 
                const amt = parseFloat(r.amount) || 0;
                if(r.payment=="Cash") cs+=amt; 
                if(r.payment=="Online") os+=amt; 
            });
            document.getElementById('cashTotal').innerText = cs.toLocaleString();
            document.getElementById('onlineTotal').innerText = os.toLocaleString();
            
            document.getElementById('history').innerHTML = filtered.reverse().map(r => `
                <div class="card">
                    <div style="width: 80%;"><b>${r.customer}</b> | ₱${parseFloat(r.amount).toLocaleString()} | ${r.payment}<br>
                    <small style="color: #555;">${(r.rows || []).filter(i => i.qty > 0).map(i => `${i.name}:${i.qty}`).join(', ') || 'None'}</small></div>
                    <div><button onclick="editRecord(${r.id})">✎</button><button onclick="deleteRecord(${r.id})" style="color:red;">✕</button></div>
                </div>`).join('');
        };
    }
</script>
</body>
</html>
