<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#333333">
    <title>JIMBETH EGG SUPPLY</title>
    <style>
        :root { --primary: #333; --bg: #f4f4f4; }
        body, html { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: var(--bg); }
        .container { height: 100vh; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; background: #fff; max-width: 500px; margin: auto; }
        h1 { font-size: 16px; margin: 0 0 10px 0; color: var(--primary); border-bottom: 2px solid var(--primary); text-align: center; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 5px; }
        th, td { border: 1px solid #eee; padding: 6px !important; text-align: center; font-size: 13px; height: 32px; }
        th { background: #f8f8f8; }
        
        .controls-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 5px; }
        .input-row { display: flex; gap: 5px; align-items: stretch; }
        input, select, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        
        #amount { flex: 0.7; }
        #paymentType { flex: 1.1; }
        #saveBtn { flex: 2.5; background: #28a745; color: white; border: none; font-weight: bold; font-size: 14px; cursor: pointer; }
        #saveBtn:active { background: #218838; }
        
        .footer-status { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 5px; }
        .s-box { padding: 6px; text-align: center; border-radius: 4px; font-weight: bold; color: white; font-size: 11px; }
        
        #history { flex-grow: 1; overflow-y: auto; border: 1px solid #eee; padding: 5px; }
        .card { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-cancel { background: #dc3545; color: #fff; border: none; cursor: pointer; font-weight: bold; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>JIMBETH EGG SUPPLY</h1>
    <input type="text" id="customer" placeholder="Customer Name" style="width: 100%; margin-bottom: 5px;">
    
    <table>
        <thead><tr><th>Item</th><th>Sold</th><th>Total</th></tr></thead>
        <tbody id="itemTableBody"></tbody>
    </table>

    <div class="controls-group">
        <div class="input-row">
            <input type="number" id="amount" placeholder="₱ Amount">
            <select id="paymentType"><option>Cash</option><option>Online</option><option>Consignment</option></select>
            <button id="saveBtn" onclick="saveRecord()">SAVE</button>
        </div>
        <button id="cancelBtn" class="btn-cancel" onclick="resetForm()" style="display:none;">CANCEL EDIT</button>
    </div>

    <div class="footer-status">
        <input type="date" id="dateFilter" onchange="updateUI()" style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
        <div class="s-box" style="background: #28a745;">CASH:<br><span id="cashTotal">0</span></div>
        <div class="s-box" style="background: #007bff;">ONLINE:<br><span id="onlineTotal">0</span></div>
    </div>
    
    <div id="history"></div>
</div>

<script>
    let db, editingId = null;
    const PASSCODE = "0729", items = ["PULLET", "SMALL", "MEDIUM", "LARGE", "XL", "JUMBO", "S-JUMBO", "OTHERS", "SALTED"];
    
    const req = indexedDB.open("SystemDB", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("data", {keyPath: "id", autoIncrement: true});
    req.onsuccess = e => { db = e.target.result; updateUI(); };

    function formatAmount(amt) { return parseInt(amt || 0).toLocaleString('en-US'); }

    function updateTable(totals = {}) { 
        document.getElementById('itemTableBody').innerHTML = items.map(i => `<tr>
            <td style="text-align:left; font-weight:bold;">${i}</td>
            <td style="padding: 4px !important;">
                <button onclick="changeQty(this, -1)" style="padding:2px 8px;">−</button>
                <input type="number" class="qty" value="" placeholder="" style="width:40px; text-align:center;">
                <button onclick="changeQty(this, 1)" style="padding:2px 8px;">+</button>
            </td>
            <td>${totals[i] || ""}</td>
        </tr>`).join(''); 
    }

    function changeQty(b, v) { 
        let input = b.parentElement.querySelector('input'); 
        let n = (parseInt(input.value) || 0) + v; 
        input.value = n > 0 ? n : ""; 
    }

    function saveRecord() {
        const c = document.getElementById('customer').value.trim(), a = document.getElementById('amount').value.trim();
        if (!c || !a) return alert("Paki-fill up ang Name at Amount!");
        const data = { customer: c, rows: items.map((n, i) => ({ name: n, qty: parseInt(document.querySelectorAll('.qty')[i].value) || 0 })), amount: a, payment: document.getElementById('paymentType').value, date: new Date().toISOString().split('T')[0] };
        const tx = db.transaction("data", "readwrite");
        editingId ? (data.id = editingId, tx.objectStore("data").put(data)) : tx.objectStore("data").add(data);
        tx.oncomplete = () => { updateUI(); resetForm(); };
    }

    function resetForm() { 
        document.getElementById('customer').value = ""; document.getElementById('amount').value = ""; 
        document.querySelectorAll('.qty').forEach(i => i.value = ""); editingId = null; 
        document.getElementById('saveBtn').textContent = "SAVE"; document.getElementById('cancelBtn').style.display = "none"; 
    }

    function editRecord(id) { 
        if (prompt("Passcode:") !== PASSCODE) return;
        db.transaction("data", "readonly").objectStore("data").get(id).onsuccess = e => { 
            const r = e.target.result; document.getElementById('customer').value = r.customer; document.getElementById('amount').value = r.amount; document.getElementById('paymentType').value = r.payment; r.rows.forEach((row, i) => document.querySelectorAll('.qty')[i].value = row.qty || ""); editingId = id; document.getElementById('saveBtn').textContent = "UPDATE"; document.getElementById('cancelBtn').style.display = "block";
        }; 
    }

    function deleteRecord(id) { 
        if (prompt("Passcode para magbura:") !== PASSCODE) return;
        db.transaction("data", "readwrite").objectStore("data").delete(id).onsuccess = () => updateUI();
    }

    function updateUI() { 
        db.transaction("data", "readonly").objectStore("data").getAll().onsuccess = e => { 
            const recs = e.target.result, filter = document.getElementById('dateFilter').value, filtered = filter ? recs.filter(r => r.date === filter) : recs, totals = {}; 
            let cash = 0, online = 0; 
            filtered.forEach(r => { 
                r.rows.forEach(row => totals[row.name] = (totals[row.name] || 0) + row.qty); 
                if (r.payment === "Cash") cash += parseInt(r.amount); else if (r.payment === "Online") online += parseInt(r.amount); 
            }); 
            updateTable(totals); 
            document.getElementById('cashTotal').textContent = formatAmount(cash); 
            document.getElementById('onlineTotal').textContent = formatAmount(online); 
            
            document.getElementById('history').innerHTML = filtered.reverse().map(r => {
                const itemsTaken = r.rows.filter(row => row.qty > 0).map(row => `${row.name} ${row.qty}`).join(' • ');
                return `<div class="card">
                    <div style="width: 80%;">
                        <strong>${r.customer}</strong> - ₱${formatAmount(r.amount)} (${r.payment})<br>
                        <small style="color: #666; font-size: 11px;">${itemsTaken || 'Walang items'}</small>
                    </div>
                    <div>
                        <button onclick="editRecord(${r.id})" style="background:none; border:none; color:blue; font-size:18px;">✎</button>
                        <button onclick="deleteRecord(${r.id})" class="btn-del">×</button>
                    </div>
                </div>`;
            }).join(''); 
        }; 
    }
</script>
</body>
</html>
