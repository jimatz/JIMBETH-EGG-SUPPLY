<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIMBETH EGG SUPPLY</title>
    <style>
        :root { --primary: #333; --bg: #f4f4f4; }
        body { margin: 0; padding: 10px; font-family: sans-serif; font-size: 13px; background: var(--bg); }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 18px; margin: 0 0 15px 0; color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
        
        .item-grid { display: grid; grid-template-columns: 1fr; gap: 4px; margin-bottom: 15px; }
        .item-row { display: flex; align-items: center; justify-content: space-between; background: #f9f9f9; padding: 8px; border-radius: 4px; border: 1px solid #eee; }
        
        .input-row { display: flex; gap: 5px; margin-bottom: 10px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .s-box { padding: 8px; text-align: center; border-radius: 5px; font-weight: bold; }
        
        #history { max-height: 250px; overflow-y: auto; border: 1px solid #eee; border-radius: 5px; padding: 5px; }
        .card { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-action { background: var(--primary); color: #fff; border: none; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-qty { background: #eee; border: 1px solid #ccc; padding: 5px 12px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>JIMBETH EGG SUPPLY</h1>
    
    <!-- Dito ang autocomplete -->
    <input type="text" id="customer" placeholder="Customer Name" style="width: 100%; margin-bottom: 10px;" 
           oninput="autoFillData()" list="customerList">
    <datalist id="customerList"></datalist>

    <div id="itemContainer" class="item-grid"></div>

    <div class="input-row">
        <input type="number" id="amount" placeholder="Amount (₱)" style="flex: 2;">
        <select id="paymentType" style="flex: 1;"><option>Cash</option><option>Online</option><option>Consign</option></select>
    </div>
    <button class="btn-action" onclick="saveRecord()">SAVE RECORD</button>

    <div class="summary-row" style="margin-top:15px;">
        <div class="s-box" style="background:#e8f5e9;">CASH: <span id="cashTotal">0</span></div>
        <div class="s-box" style="background:#e3f2fd;">ONLINE: <span id="onlineTotal">0</span></div>
    </div>

    <h3>Active Totals</h3>
    <div id="totalBox" class="item-grid" style="font-size: 12px; margin-bottom: 15px;"></div>
    
    <h3>History</h3>
    <div id="history"></div>
</div>

<script>
    const items = ["PEEWEE", "PULLET", "SMALL", "MEDIUM", "LARGE", "XL", "JUMBO", "S-JUMBO", "OTHERS", "SALTED"];
    items.forEach(i => document.getElementById('itemContainer').innerHTML += `
        <div class="item-row">
            <span style="font-weight: bold; font-size: 12px; width: 100px;">${i}</span>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="btn-qty" onclick="changeQty(this, -1)">-</button>
                <input type="number" class="qty" value="0" style="width: 40px; text-align: center; border:1px solid #ccc; padding:5px;">
                <button class="btn-qty" onclick="changeQty(this, 1)">+</button>
            </div>
        </div>`);

    function changeQty(b, v) { let i = b.parentElement.querySelector('input'); let n = parseInt(i.value) + v; i.value = n >= 0 ? n : 0; }

    let db;
    const req = indexedDB.open("SystemDB", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("data", {keyPath: "id", autoIncrement: true});
    req.onsuccess = e => { db = e.target.result; updateUI(); };

    // Function para sa Auto-fill at List Generation
    function autoFillData() {
        const v = document.getElementById('customer').value;
        db.transaction("data", "readonly").objectStore("data").getAll().onsuccess = e => {
            const history = e.target.result;
            // I-fill ang payment type base sa huling record ng customer
            const l = history.reverse().find(r => r.customer === v);
            if (l) document.getElementById('paymentType').value = l.payment;
        };
    }

    function saveRecord() {
        const c = document.getElementById('customer').value.trim();
        const a = document.getElementById('amount').value.trim();
        if (!c || !a) return alert("Paki-fill up!");
        const data = { customer: c, rows: items.map((n, i) => ({ name: n, qty: parseInt(document.querySelectorAll('.qty')[i].value) || 0 })), amount: a, payment: document.getElementById('paymentType').value };
        const tx = db.transaction("data", "readwrite");
        tx.objectStore("data").add(data);
        tx.oncomplete = () => { updateUI(); document.getElementById('customer').value = ""; document.getElementById('amount').value = ""; document.querySelectorAll('.qty').forEach(i => i.value = "0"); };
    }

    function deleteRecord(id) { db.transaction("data", "readwrite").objectStore("data").delete(id).onsuccess = updateUI; }
    
    function editRecord(id) {
        db.transaction("data", "readonly").objectStore("data").get(id).onsuccess = e => {
            const r = e.target.result;
            document.getElementById('customer').value = r.customer;
            document.getElementById('amount').value = r.amount;
            document.getElementById('paymentType').value = r.payment;
            r.rows.forEach((row, i) => document.querySelectorAll('.qty')[i].value = row.qty || "0");
            deleteRecord(id);
        };
    }

    function updateUI() {
        db.transaction("data", "readonly").objectStore("data").getAll().onsuccess = e => {
            const recs = e.target.result;
            
            // Dito ini-update ang datalist para sa autocomplete
            const uniqueCustomers = [...new Set(recs.map(r => r.customer))];
            document.getElementById('customerList').innerHTML = uniqueCustomers.map(n => `<option value="${n}">`).join('');
            
            let tot = {}; items.forEach(i => tot[i] = 0);
            recs.forEach(r => r.rows.forEach(row => tot[row.name] += row.qty));
            let cs=0, os=0; recs.forEach(r => { if(r.payment=="Cash") cs+=+r.amount; if(r.payment=="Online") os+=+r.amount; });
            document.getElementById('cashTotal').innerText = `₱${cs.toLocaleString()}`;
            document.getElementById('onlineTotal').innerText = `₱${os.toLocaleString()}`;
            document.getElementById('totalBox').innerHTML = items.filter(i => tot[i] > 0).map(i => `<div class="item-row">${i}: <b>${tot[i]}</b></div>`).join('');
            document.getElementById('history').innerHTML = recs.reverse().map(r => `
                <div class="card">
                    <div style="flex-grow: 1;">
                        <b>${r.customer}</b> - ₱${r.amount} (${r.payment})<br>
                        <small style="color: #666; font-size: 10px;">${r.rows.filter(x => x.qty > 0).map(x => `${x.name}:${x.qty}`).join(' | ')}</small>
                    </div>
                    <div>
                        <button class="btn-qty" onclick="editRecord(${r.id})">✎</button>
                        <button class="btn-qty" onclick="deleteRecord(${r.id})">✕</button>
                    </div>
                </div>`).join('');
        };
    }
</script>
</body>
</html>
