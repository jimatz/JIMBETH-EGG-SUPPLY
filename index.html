
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>JIMBETH EGG SUPPLY</title>
    <style>
        :root { --primary: #333; --bg: #f4f4f4; }
        body { margin: 0; padding: 10px; font-family: sans-serif; font-size: 12px; background: var(--bg); }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 16px; margin: 0 0 10px 0; color: var(--primary); border-bottom: 2px solid var(--primary); }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid #eee; padding: 5px; text-align: center; }
        th { background: #f8f8f8; font-size: 11px; }
        
        .input-row { display: flex; gap: 5px; margin-bottom: 10px; }
        input, select, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        
        .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .s-box { padding: 6px; text-align: center; border-radius: 4px; font-weight: bold; color: white; }
        
        #history { max-height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 5px; }
        .card { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-action { background: var(--primary); color: #fff; border: none; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-qty { background: #eee; border: 1px solid #ccc; padding: 2px 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <button id="installBtn" style="display:none; width: 100%; background: #007bff; color: white; padding: 8px; border: none; border-radius: 4px; margin-bottom: 10px;">INSTALL APP</button>
    <h1>JIMBETH EGG SUPPLY</h1>
    
    <input type="text" id="customer" placeholder="Customer Name" style="width: 100%; margin-bottom: 5px;" oninput="autoFillData()" list="customerList">
    <datalist id="customerList"></datalist>

    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Total</th>
                <th>Sold</th>
            </tr>
        </thead>
        <tbody id="itemTableBody"></tbody>
    </table>

    <div class="input-row">
        <input type="number" id="amount" placeholder="Amount (₱)" style="flex: 2;">
        <select id="paymentType" style="flex: 1;">
            <option>Cash</option>
            <option>Online</option>
            <option>Consignment</option>
        </select>
    </div>
    <button class="btn-action" onclick="saveRecord()">SAVE RECORD</button>

    <div class="summary-row" style="margin-top:10px;">
        <div class="s-box" style="background: #28a745;">CASH: <span id="cashTotal">0</span></div>
        <div class="s-box" style="background: #007bff;">ONLINE: <span id="onlineTotal">0</span></div>
    </div>
    
    <h3>History</h3>
    <div id="history"></div>
</div>

<script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').style.display = 'block'; });
    document.getElementById('installBtn').addEventListener('click', () => { if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } });

    const items = ["PEEWEE", "PULLET", "SMALL", "MEDIUM", "LARGE", "XL", "JUMBO", "S-JUMBO", "OTHERS", "SALTED"];
    let db;
    const req = indexedDB.open("SystemDB", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("data", {keyPath: "id", autoIncrement: true});
    req.onsuccess = e => { db = e.target.result; updateUI(); };

    function updateTable(totals = {}) {
        document.getElementById('itemTableBody').innerHTML = items.map(i => `
            <tr>
                <td style="text-align:left; font-weight:bold;">${i}</td>
                <td>
                    <button class="btn-qty" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="qty" value="0" onfocus="if(this.value=='0') this.value=''" style="width:30px; text-align:center; border:1px solid #ccc;">
                    <button class="btn-qty" onclick="changeQty(this, 1)">+</button>
                </td>
                <td><b>${totals[i] || 0}</b></td>
            </tr>`).join('');
    }

    function changeQty(b, v) { 
        let i = b.parentElement.querySelector('input'); 
        let n = parseInt(i.value || 0) + v; 
        i.value = n >= 0 ? n : 0; 
    }

    function autoFillData() {
        const v = document.getElementById('customer').value;
        db.transaction("data", "readonly").objectStore("data").getAll().onsuccess = e => {
            const l = e.target.result.reverse().find(r => r.customer === v);
            if (l) document.getElementById('paymentType').value = l.payment;
        };
    }

    function saveRecord() {
        const c = document.getElementById('customer').value.trim();
        const a = document.getElementById('amount').value.trim();
        if (!c || !a) return alert("Paki-fill up!");
        const data = { customer: c, rows: items.map((n, i) => ({ name: n, qty: parseInt(document.querySelectorAll('.qty')[i].value) || 0 })), amount: a, payment: document.getElementById('paymentType').value };
        db.transaction("data", "readwrite").objectStore("data").add(data).onsuccess = () => { 
            updateUI(); 
            document.getElementById('customer').value = ""; 
            document.getElementById('amount').value = ""; 
            document.querySelectorAll('.qty').forEach(i => i.value = "0");
        };
    }

    function editRecord(id) {
        db.transaction("data", "readonly").objectStore("data").get(id).onsuccess = e => {
            const r = e.target.result;
            document.getElementById('customer').value = r.customer;
            document.getElementById('amount').value = r.amount;
            document.getElementById('paymentType').value = r.payment;
            r.rows.forEach((row, i) => { document.querySelectorAll('.qty')[i].value = row.qty; });
            deleteRecord(id);
        };
    }

    function deleteRecord(id) { db.transaction("data", "readwrite").objectStore("data").delete(id).onsuccess = updateUI; }

    function updateUI() {
        db.transaction("data", "readonly").objectStore("data").getAll().onsuccess = e => {
            const recs = e.target.result;
            document.getElementById('customerList').innerHTML = [...new Set(recs.map(r => r.customer))].map(n => `<option value="${n}">`).join('');
            let tot = {}; items.forEach(i => tot[i] = 0);
            recs.forEach(r => r.rows.forEach(row => tot[row.name] = (tot[row.name] || 0) + row.qty));
            updateTable(tot);
            
            let cs=0, os=0; recs.forEach(r => { if(r.payment=="Cash") cs+=+r.amount; if(r.payment=="Online") os+=+r.amount; });
            document.getElementById('cashTotal').innerText = cs.toLocaleString();
            document.getElementById('onlineTotal').innerText = os.toLocaleString();
            
            document.getElementById('history').innerHTML = recs.reverse().map(r => `
                <div class="card">
                    <div>
                        <b>${r.customer}</b> - ₱${parseFloat(r.amount).toLocaleString()} <small>(${r.payment})</small><br>
                        <small style="color: #666; font-size: 10px;">${r.rows.filter(x=>x.qty>0).map(x=>x.name+':'+x.qty).join(' | ')}</small>
                    </div>
                    <div>
                        <button onclick="editRecord(${r.id})" style="padding: 2px 6px; cursor: pointer;">✎</button>
                        <button onclick="deleteRecord(${r.id})" style="padding: 2px 6px; cursor: pointer;">✕</button>
                    </div>
                </div>`).join('');
        };
    }
</script>
</body>
</html>
